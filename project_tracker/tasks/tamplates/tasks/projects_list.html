{% extends 'base/base.html' %}

{% block content %}
    <h2>Список проектов</h2>
    <ul>
        {% for project in project_list %}
            <li><a href="{% url 'tasks:project_detail' project.id %}">{{ project.name }}</a></li>
        {% empty %}
            <li>Проектов пока нет.</li>
        {% endfor %}
    </ul>
{% endblock %}
